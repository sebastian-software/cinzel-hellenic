name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    # macOS so the preview renderer finds Arial under /System/Library/Fonts
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install tooling
        run: python -m pip install -r requirements.txt

      - name: Build fonts
        run: bash sources/build.sh

      - name: Verify committed fonts match sources
        run: git diff --exit-code fonts

      - name: Run fontbakery
        run: >-
          fontbakery check-universal --succinct
          --configuration sources/fontbakery.yaml
          fonts/ttf/CinzelHellenic-Regular.ttf

      - name: Render previews
        run: python tools/render-previews.py

      - uses: actions/upload-artifact@v4
        with:
          name: previews
          path: previews/
